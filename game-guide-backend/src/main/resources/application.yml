spring:
  application:
    name: game-guide-backend
  servlet:
    multipart:
      max-file-size: 10MB      # 单个文件最大 10MB
      max-request-size: 20MB   # 单次请求总大小最大 20MB
  profiles:
    active: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://192.168.2.108:5433/game_guide
    username: user_XA6emr
    password: password_SEcYGz
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.gameguide.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

pagehelper:
  helper-dialect: postgresql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

server:
  port: 8080

jwt:
  secret: game-guide-secret-key-for-jwt-token-generation-must-be-at-least-256-bits
  expiration: 86400000

app:
  auth:
    # 是否忽略用户认证（默认 false，仅 dev 环境下配置为 true 才生效）
    ignore-auth: false

# HttpClient 配置
http:
  client:
    connect-timeout: 10      # 连接超时（秒）
    read-timeout: 15         # 读取超时（秒）
    write-timeout: 10        # 写入超时（秒）

# 爬虫配置
spider:
  vgover:
    start-page: 1            # 起始页码
    end-page: 10             # 结束页码
    delay-millis: 1000       # 每篇文章间隔延迟（毫秒）
    topic-id: "1612"         # 爬取的 topic ID

logging:
  level:
    com.gameguide: debug
    org.springframework: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

file:
  # 存储类型: local(本地存储) 或 minio(MinIO对象存储)
  storage:
    type: minio
  upload:
    path: D:/project/game-guide/uploads
    url-prefix: /api/files/

# 智谱 AI 配置
zhipu:
  ai:
    api-key: fce88b44242043ba985840d6abf2d2c5.Rcc2ai0R8XLynGLm
    embedding-model: embedding-3   # 向量模型，输出 2048 维
    chat-model: glm-4-flash        # 对话模型（glm-4-flash 免费额度多）
    top-k: 5                       # 向量检索返回 Top-K 条攻略
    # 定时任务：每天凌晨2点自动回填无 embedding 的攻略
    embedding-cron: "0 0 2 * * ?"
    prompts:
      # {context} 占位符会被替换为检索到的攻略内容
      system: |
        你是一个专业的游戏攻略助手。
        请严格根据下方提供的攻略内容回答用户问题，不要编造信息。
        如果攻略中没有相关内容，请如实告知并建议用户浏览攻略列表。

        【参考攻略内容】
        {context}
      # 向量检索无结果时的兜底提示
      no-context: |
        你是一个专业的游戏攻略助手。
        当前攻略库中暂无与该问题匹配的内容，请根据通用游戏知识回答，
        并在回答末尾注明【以上为通用建议，非攻略库内容】。

# MinIO对象存储配置
minio:
  endpoint: http://192.168.2.108:9000
  access-key: minio_5nAdys
  secret-key: minio_jM3WYB
  bucket-name: game-guide

